name: Update Blogger Sitemap Data

on:
  schedule:
    # Berjalan setiap hari pada jam 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Memungkinkan eksekusi manual melalui tombol di GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Jalankan Skrip Scraper
        run: node scraper.js

      - name: Commit dan Push Perubahan
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          # Jika tidak ada perubahan data, lewati proses commit
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update: Memperbarui database posts.json"
          git push origin main
